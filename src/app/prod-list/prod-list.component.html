<div class="container mt-4">

<h2 class="text-primary">Product List</h2>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let p of products">

<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>{{p.category}}</td>
<td>{{p.price}}</td>
<td>

<span class="badge bg-success" [hidden]="p.stock==0">
{{p.stock}}
</span>

</td>

</tr>

</tbody>

</table>

</div>
