<h2>Product List</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let product of products">
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.status }}</td>
      <td>
        <button (click)="viewProductDetails(product)">View</button>
      </td>
    </tr>
  </tbody>
</table>
